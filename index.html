<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger — Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="topbar">
        <div class="brand">◆ Ledger</div>
        <div class="top-actions">
            <!-- ⬇️ Replace href with your existing repo's GitHub Pages URL -->
            <a href="https://yourusername.github.io/existing-repo/" target="_blank" rel="noopener" class="ghost-btn">Legacy ↗</a>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
        </div>
    </nav>

    <main class="container">
        <section class="toolbar">
            <div class="field">
                <label>Account</label>
                <div class="inline">
                    <select id="account-filter"></select>
                    <button id="add-account" class="mini-btn" title="Add account">+</button>
                </div>
            </div>
            <div class="field">
                <label>Period</label>
                <select id="month-filter"></select>
            </div>
            <div class="field">
                <label>Monthly Budget</label>
                <input type="number" id="budget-input" min="0" step="0.01" placeholder="0">
            </div>
            <div class="field csv">
                <label>Data</label>
                <div class="inline">
                    <button id="export-csv" class="mini-btn">Export</button>
                    <button id="import-csv-btn" class="mini-btn">Import</button>
                    <input type="file" id="import-csv" accept=".csv" hidden>
                </div>
            </div>
        </section>

        <section class="stats">
            <div class="stat">
                <span class="stat-label">Net</span>
                <span id="balance" class="stat-value">$0.00</span>
            </div>
            <div class="stat in">
                <span class="stat-label">In</span>
                <span id="total-income" class="stat-value">$0.00</span>
            </div>
            <div class="stat out">
                <span class="stat-label">Out</span>
                <span id="total-expense" class="stat-value">$0.00</span>
            </div>
            <div class="stat budget">
                <span class="stat-label">Budget</span>
                <span id="budget-status" class="stat-value">$0 / $0</span>
                <div class="bar"><div id="budget-fill" class="bar-fill"></div></div>
                <small id="budget-msg"></small>
            </div>
        </section>

        <section class="grid">
            <div class="panel">
                <h2>New Transaction</h2>
                <form id="transaction-form">
                    <div class="form-row">
                        <div class="field">
                            <label>Note</label>
                            <input id="description" required placeholder="e.g. Groceries">
                        </div>
                        <div class="field">
                            <label>Amount</label>
                            <input id="amount" type="number" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="field">
                            <label>Type</label>
                            <select id="type">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Category</label>
                            <select id="category">
                                <option>Food</option><option>Transport</option>
                                <option>Bills</option><option>Entertainment</option>
                                <option>Salary</option><option>Other</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Date</label>
                            <input id="date" type="date" required>
                        </div>
                    </div>

                    <label class="check"><input type="checkbox" id="recurring-toggle"> Recurring</label>
                    <div id="recurring-fields" class="recurring-fields hidden">
                        <div class="form-row">
                            <div class="field">
                                <label>Repeat</label>
                                <select id="frequency">
                                    <option value="daily">Daily</option>
                                    <option value="weekly">Weekly</option>
                                    <option value="monthly">Monthly</option>
                                </select>
                            </div>
                            <div class="field">
                                <label>Until (optional)</label>
                                <input id="recurring-end" type="date">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="primary">Add</button>
                </form>
            </div>

            <div class="panel">
                <h2>Spending by Category</h2>
                <div class="chart-wrap"><canvas id="expense-chart"></canvas></div>
            </div>
        </section>

        <section class="panel">
            <h2>Recurring Rules</h2>
            <div id="recurring-list" class="recurring-list"></div>
        </section>

        <section class="panel">
            <div class="panel-head"><h2>Activity</h2></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Note</th><th>Category</th><th>Type</th><th>Amount</th><th></th></tr>
                    </thead>
                    <tbody id="transaction-list"></tbody>
                </table>
            </div>
            <button id="clear-all" class="danger">Clear All</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

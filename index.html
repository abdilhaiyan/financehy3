<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 My Finance Dashboard</h1>
            <p class="subtitle">Track your personal income & expenses</p>
        </header>

        <section class="summary">
            <div class="card net">
                <h3 id="net-label">Net (All Time)</h3>
                <p id="balance">$0.00</p>
            </div>
            <div class="card income">
                <h3 id="income-label">Income (All Time)</h3>
                <p id="total-income">$0.00</p>
            </div>
            <div class="card expense">
                <h3 id="expense-label">Expenses (All Time)</h3>
                <p id="total-expense">$0.00</p>
            </div>
            <div class="card budget">
                <h3>Monthly Budget</h3>
                <p id="budget-status">$0 / $0</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="budget-fill"></div>
                </div>
                <small id="budget-msg"></small>
            </div>
        </section>

        <section class="controls">
            <div class="control-group">
                <label for="month-filter">📅 Filter Month</label>
                <select id="month-filter"></select>
            </div>
            <div class="control-group">
                <label for="budget-input">💵 Set Monthly Budget ($)</label>
                <input type="number" id="budget-input" step="0.01" min="0" placeholder="e.g. 2000">
            </div>
            <div class="control-group csv-group">
                <button id="export-csv" class="secondary">⬇ Export CSV</button>
                <button id="import-csv-btn" class="secondary">⬆ Import CSV</button>
                <input type="file" id="import-csv" accept=".csv" hidden>
            </div>
        </section>

        <section class="main-content">
            <div class="form-section">
                <h2>Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="e.g. Grocery shopping" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Salary">Salary</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit">Add Transaction</button>
                </form>
            </div>

            <div class="chart-section">
                <h2>Expense Breakdown</h2>
                <canvas id="expense-chart"></canvas>
            </div>
        </section>

        <section class="transactions">
            <div class="transactions-header">
                <h2>Transactions</h2>
            </div>
            <div class="table-wrapper">
                <table id="transaction-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-list"></tbody>
                </table>
            </div>
            <button id="clear-all" class="clear-btn">Clear All Data</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
